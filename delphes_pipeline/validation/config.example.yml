# Example config for the Delphes card-validation gate.
# Copy to config.yml, edit `input.delphes_root`, and run:
#   python -m delphes_pipeline.validation.run_validation --config config.yml

input:
  # A signal sample is a directory of Delphes ROOT files; delphes_root may be a
  # file, a directory (read recursively), or a glob. On KIT ETP deepthought the
  # Summer24 samples live under /ceph/jpan/cms_nanoaod_2024_hh2b2tau/. The glob
  # below matches the SM (kl=1) Delphes sample regardless of its exact dir name;
  # a directory glob is expanded to its *.root. kappa_lambda points: 0, 1, 5.
  # Validate all three at once with runners/validate_all.sh.
  delphes_root: /ceph/jpan/cms_nanoaod_2024_hh2b2tau/delphes/*kl-1p00*
  treename: Delphes
  max_events: null            # null = all; set an int for a fast smoke run

card: cards/cms_card_v0.tcl

references:
  dir: delphes_pipeline/validation/references/data   # digitised POG JSONs (optional)

# Private NanoAOD tuning anchor (note Sec.3, 6.4). When enabled, the tuning lens
# measures the SAME object response on this CMS NanoAOD and uses it as the target
# (b-tag/lepton via the shared observables, tau_eff via GenVisTau+DeepTau, MET
# overall). Object response is ~kappa_lambda-independent, so the SM (kl=1) NanoAOD
# is the anchor. NanoAODv15 / 2024 -> UParT-AK4 b-tag + DeepTau v2p5.
anchor:
  enabled: true                # measure the tuning targets on the NanoAOD anchor
  # SM kl=1 NanoAODv15 (central PowhegBugFix + its ext1; excludes 150X-kit-private).
  nanoaod_path: /ceph/jpan/cms_nanoaod_2024_hh2b2tau/*kl-1p00*NanoAODv15-PowhegBugFix*
  max_events: 200000           # cap for the anchor measurement (shape only)
  wp:
    btag_medium: null          # UParT-AK4 Medium discriminant cut; left null -> resolved from
                               # jsonpog-integration below. Set a float to override.
    btag_correctionlib:        # CVMFS BTV JSON -> the Medium cut (confirm <era> with `ls`)
      json: /cvmfs/cms.cern.ch/rsync/cms-nanoAOD/jsonpog-integration/POG/BTV/2024_Summer24/btagging.json.gz
      tagger: UParT            # auto-finds the '<tagger>_wp_values' correction
      wp: M                    # 2024_Summer24 -> UParTAK4_wp_values, Medium = 0.1272
      # correction: UParTAK4_wp_values   # set explicitly if auto-find ever fails;
      #   list names with: python -m delphes_pipeline.tuning.correctionlib_wp <json>
    deeptau_vsjet_medium: 16    # DeepTau v2p5 VSjet Medium bit (NanoAOD bitmask; reader uses >=)
  branches:                    # NanoAODv15 defaults; override only if your era differs
    jet: { btag_disc: Jet_btagUParTAK4B }
    tau: { vsjet: Tau_idDeepTau2018v2p5VSjet }

# Downstream tuning maps (note §3, D2 option A). The Delphes card's tagger bits
# are ignored; the b-tag is re-derived downstream from Jet.Flavor + the per-flavour
# efficiency measured on the NanoAOD anchor (stochastic re-tag). Derive the maps with
#   python -m delphes_pipeline.tuning.derive_maps --config config.yml
# then set the path below. The tuning lens re-validates the b-tag observables against the
# anchor with the re-tag applied, and production ntuplization picks it up via
#   python -m delphes_pipeline.ntuplizer.convert in.root out.parquet --config config.yml
# so the shipped ntuple carries the tuned tags (seed 0 on both, no card edit, no re-production).
# Leave null to keep the stock Jet.BTag.
tuning_maps: null              # e.g. cards/tuning/maps_v0.json

output:
  dir: outputs/validation

# Level-1 candle samples (note §6.2). The candles run on these background Delphes
# samples (not the signal). Set enabled: true under levels.level1 to run them.
candles:
  ttbar:   /ceph/jpan/cms_nanoaod_2024_hh2b2tau/delphes/*TTto2L2Nu*   # eμ b-tag closure
  ztautau: /ceph/jpan/cms_nanoaod_2024_hh2b2tau/delphes/*DYto2Tau*    # Z->ττ estimator chain
  max_events: 200000

# Which ladder levels to run. pilot_gate + level0 + ntuplizer + level1 implemented;
# level2-4 are stubs and stay disabled until they are built.
levels:
  pilot_gate:
    enabled: true
  level0:
    enabled: true
    # (pT, |eta|) binning for the object-response measurements
    pt_bins:  [20, 30, 40, 50, 70, 100, 150, 200, 300]
    eta_bins: [0.0, 0.8, 1.5, 2.4]
    sumet_bins: [0, 100, 200, 300, 500, 800, 1200]   # MET resolution vs sum E_T
    min_bin_count: 25         # bins with fewer entries are not closure-tested
  ntuplizer:
    enabled: true             # convert a slice and validate the flat schema + counts
    max_events: 2000
  level1: { enabled: false }  # set true once candles.{ttbar,ztautau} point at the samples
  level2: { enabled: false }  # stub
  level3: { enabled: false }  # stub
  level4:                     # κ_λ-critical m_HH faithfulness (runs on the signal sample)
    enabled: false            # set true on the HH→bb̄ττ signal to gate the m_HH lineshape

# Pass/fail thresholds. Placeholders pending the v0 anchor targets (note §3,§7);
# tune against the private NanoAOD anchor once available.
tolerances:
  pilot_gate:
    neg_weight_fraction_max: 0.30   # signal is Powheg; small negative fraction
    min_gen_taus: 1                 # signal events must contain gen taus
    mbb_width_max_gev: 30.0         # m_bb core-window std ceiling
    mbb_core_fraction_min: 0.30     # min fraction of leading pairs in the 100-150 GeV core
    met_resolution_max_gev: 40.0    # width of (MET - GenMET) sanity ceiling
    kb_per_event_max: 150.0         # storage projection ceiling (full TreeWriter)
  level1:
    eb_closure_rel_tol: 0.10        # tt̄ in-situ ε_b vs the tuned input
    mtautau_peak_tol_gev: 10.0      # Z→ττ FastMTT m_ττ peak must sit within this of m_Z
    mtautau_met_sigma_gev: 25.0     # fixed (covariance-free) per-component MET σ for FastMTT
  level4:
    mhh_scale_tol: 0.10             # |median(reco/gen m_HH) − 1| ceiling in 250–400 GeV
    mhh_resolution_max: 0.20        # σ(reco/gen m_HH) ceiling so the κ_λ lineshape survives
  level0:
    closure_rel_tol: 0.05           # per-bin systematic tolerance on |measured/expected - 1|
    closure_nsigma: 2.0             # a bin fails only if it also misses by > this many stat sigma
    max_failing_bin_fraction: 0.20  # closure passes if <= this fraction of tested bins fail
    met_resolution_max_gev: 40.0    # MET resolution sanity ceiling (vs sum E_T)
    # Per-quantity gate severity. Default 'gate' (closure failure blocks production).
    # The four below sit at warn for the pre-v0 card — DESIGN.md is explicit
    # that "a full Level-0 POG-overlay match is not yet meaningful on this
    # card". Each is a known stock-Delphes cascade effect that tuning set v0
    # will absorb; the closure infrastructure still measures and surfaces them.
    # Flip back to 'gate' once v0 lands and the formulas are retuned.
    #   tau_mistag:   stock TauTagging EfficiencyFormula {0}=0.01 is per-parton,
    #                 measured per-jet rate is ~1.5x in busy bb̄ττ topologies.
    #   electron_eff: card_formulas transcribes ONLY the ElectronEfficiency
    #                 plateau (0.95). The full Delphes chain is tracking ×
    #                 reco × isolation (PTRatioMax=0.12); on busy HH→bbττ events
    #                 the isolation cut yields a ~0.83 effective barrel plateau.
    #   muon_eff:     same shape as electron — full chain is tracking × reco ×
    #                 isolation (PTRatioMax=0.25). High-pT barrel plateau lands
    #                 at ~0.93 instead of 0.95.
    #   btag_eff_c:   c is ~20x rarer than b in bb̄ττ (~0.1 c-jet/event) and the
    #                 low-pT bins are gluon-split-dominated; the stock c-formula
    #                 is a poor model of that population (anchor c-eff falls
    #                 0.18->0.10 vs the card's rising 0.10->0.18) and is
    #                 superseded by the v0 anchor re-tag, which redoes c-tagging
    #                 from Jet.Flavor + the CMS map. b/light close 0/8 bins.
    closure_severity:
      tau_mistag: warn
      electron_eff: warn
      muon_eff: warn
      btag_eff_c: warn
